    <style>
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

        :root {
            /* surfaces */
            --bg:           #0A0B10;
            --bg-2:         #0E0F15;
            --surface:      #14151E;
            --surface-2:    #1A1C27;
            --surface-3:    #20222F;
            --border:       #262833;
            --border-2:     #2F313F;
            --border-focus: #3D4055;

            /* text */
            --text:         #E8E9F0;
            --text-2:       #B4B6C4;
            --text-muted:   #6B6E80;
            --text-dim:     #44475A;

            /* brand */
            --primary:      #6366F1;
            --primary-2:    #818CF8;
            --primary-3:    #4F46E5;
            --primary-bg:   rgba(99, 102, 241, 0.10);
            --primary-bg-2: rgba(99, 102, 241, 0.18);

            /* semantic */
            --amber:        #E9B872;
            --amber-bg:     rgba(233, 184, 114, 0.10);
            --green:        #4ADE80;
            --green-2:      #22c55e;
            --green-bg:     rgba(74, 222, 128, 0.10);
            --red:          #F87171;
            --red-bg:       rgba(248, 113, 113, 0.10);

            --radius-sm: 8px;
            --radius:    12px;
            --radius-lg: 16px;
            --radius-xl: 20px;

            --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
            --shadow:    0 4px 16px rgba(0,0,0,0.25), 0 1px 2px rgba(0,0,0,0.4);
            --shadow-lg: 0 20px 50px rgba(0,0,0,0.5), 0 8px 16px rgba(0,0,0,0.3);
        }

        html, body { background: var(--bg); }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: var(--text);
            min-height: 100vh;
            padding: 24px 16px 80px;
            font-feature-settings: "cv11", "ss01", "ss03";
            -webkit-font-smoothing: antialiased;
            background:
              radial-gradient(1200px 600px at 50% -200px, rgba(99,102,241,0.10), transparent 60%),
              var(--bg);
        }

        .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-variant-numeric: tabular-nums; font-feature-settings: "ss01", "ss02"; }

        .shell { max-width: 620px; margin: 0 auto; }

        /* ─────────────── HEADER ─────────────── */
        .top-bar {
            display:flex; align-items:center; justify-content:space-between;
            margin-bottom: 24px;
        }
        .brand { display:flex; align-items:center; gap:12px; }
        .brand-mark {
            width:40px; height:40px; border-radius:11px;
            background: linear-gradient(135deg, var(--primary-2) 0%, var(--primary-3) 100%);
            display:flex; align-items:center; justify-content:center;
            box-shadow: 0 6px 20px rgba(99,102,241,0.35), inset 0 1px 0 rgba(255,255,255,0.15);
            flex-shrink:0;
        }
        .brand-mark svg { width:24px; height:24px; }
        .brand-text { display:flex; flex-direction:column; gap:1px; }
        .brand-name {
            font-size: 1.25rem; font-weight: 800; color:#fff;
            letter-spacing: -0.03em; line-height: 1;
        }
        .brand-name .accent { color: var(--primary-2); }
        .brand-tag {
            font-size: 0.72rem; color: var(--text-muted); font-weight: 500;
            letter-spacing: 0.01em;
        }

        .header-actions { display:flex; gap:8px; }
        .icon-btn {
            width:38px; height:38px; border-radius:10px;
            background: var(--surface); border:1px solid var(--border);
            display:flex; align-items:center; justify-content:center;
            color: var(--text-2); cursor:pointer; transition: all .15s;
        }
        .icon-btn:hover { background: var(--surface-2); border-color: var(--border-2); color: var(--text); }
        .icon-btn svg { width:16px; height:16px; }

        /* ─────────────── HERO TOTAL ─────────────── */
        .hero {
            background: linear-gradient(160deg, rgba(99,102,241,0.18) 0%, rgba(99,102,241,0.04) 60%, transparent 100%), var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 22px 22px 18px;
            margin-bottom: 14px;
            position: relative;
            overflow: hidden;
        }
        .hero::before {
            content:''; position:absolute; inset:0;
            background: radial-gradient(400px 200px at 90% -50px, rgba(129,140,248,0.25), transparent 70%);
            pointer-events: none;
        }
        .hero-content { position:relative; }
        .hero-lbl {
            font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.10em;
            font-weight: 700; color: var(--primary-2);
            display:flex; align-items:center; gap:8px;
            margin-bottom: 10px;
        }
        .hero-lbl::before {
            content:''; width:6px; height:6px; border-radius:2px;
            background: var(--primary-2);
            box-shadow: 0 0 8px var(--primary-2);
        }
        .hero-amount {
            font-size: 2.6rem; font-weight: 800; color:#fff;
            letter-spacing: -0.04em; line-height: 1;
            display:flex; align-items:baseline; gap:4px;
        }
        .hero-amount .currency { font-size: 1.2rem; color: var(--text-muted); font-weight: 600; align-self: flex-start; margin-top: 6px; }

        .hero-meta {
            display:flex; gap: 24px; margin-top: 18px;
            padding-top: 14px; border-top: 1px solid var(--border);
        }
        .hero-stat { display:flex; flex-direction:column; gap:3px; }
        .hero-stat-val { font-size: 1.1rem; font-weight: 700; color: var(--text); letter-spacing: -0.02em; }
        .hero-stat-lbl { font-size: 0.7rem; color: var(--text-muted); font-weight: 500; letter-spacing: 0.02em; }

        /* ─────────────── CARDS ─────────────── */
        .card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            padding: 18px;
            margin-bottom: 12px;
        }
        .card-head {
            display:flex; align-items:center; justify-content:space-between;
            margin-bottom: 14px;
        }
        .card-title {
            font-size: 0.78rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.08em;
            color: var(--text-2);
            display:flex; align-items:center; gap: 8px;
        }
        .card-title svg { width:14px; height:14px; color: var(--primary-2); }
        .card-count {
            font-size: 0.7rem; font-weight: 700; color: var(--text-muted);
            background: var(--surface-2); border:1px solid var(--border);
            padding: 2px 8px; border-radius: 999px; min-width: 22px; text-align:center;
        }

        /* ─────────────── INPUTS ─────────────── */
        .input-row { display:flex; gap:8px; }

        input[type="text"], input[type="number"] {
            padding: 12px 14px;
            background: var(--bg-2); color: var(--text);
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            width: 100%;
            transition: border-color .15s, background .15s;
        }
        input::placeholder { color: var(--text-dim); }
        input:focus {
            outline:none; border-color: var(--primary); background: var(--surface-2);
            box-shadow: 0 0 0 3px var(--primary-bg);
        }

        /* ─────────────── BUTTONS ─────────────── */
        .btn {
            padding: 12px 16px;
            border: 1px solid transparent;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.88rem;
            font-family: 'Inter', sans-serif;
            transition: all .15s;
            white-space: nowrap;
            min-height: 44px;
            display:inline-flex; align-items:center; justify-content:center; gap:8px;
            letter-spacing: -0.01em;
        }
        .btn svg { width:15px; height:15px; flex-shrink:0; }
        .btn:active { transform: scale(0.98); }
        .btn-primary {
            background: var(--primary); color:#fff;
            box-shadow: 0 4px 12px rgba(99,102,241,0.30), inset 0 1px 0 rgba(255,255,255,0.15);
        }
        .btn-primary:hover { background: var(--primary-3); }
        .btn-green { background: var(--green-2); color:#fff; box-shadow: 0 4px 12px rgba(34,197,94,0.25), inset 0 1px 0 rgba(255,255,255,0.15); }
        .btn-green:hover { background: #16a34a; }
        .btn-ghost {
            background: var(--surface-2); color: var(--text-2);
            border: 1px solid var(--border);
        }
        .btn-ghost:hover { background: var(--surface-3); color: var(--text); border-color: var(--border-2); }
        .btn-full { width:100%; }

        /* ─────────────── PEOPLE TAGS ─────────────── */
        .people-tags { display:flex; flex-wrap:wrap; gap:6px; margin-bottom: 12px; min-height: 0; }
        .people-tags:empty { display:none; }
        .p-tag {
            display:inline-flex; align-items:center; gap:8px;
            background: var(--primary-bg); color: var(--primary-2);
            border: 1px solid rgba(99,102,241,0.25);
            padding: 6px 6px 6px 12px;
            border-radius: 999px;
            font-size: 0.82rem; font-weight: 600;
        }
        .p-tag-x {
            width:18px; height:18px; border-radius: 999px;
            display:inline-flex; align-items:center; justify-content:center;
            background: rgba(99,102,241,0.18); border:none; cursor:pointer;
            color: var(--primary-2);
            transition: background .15s;
        }
        .p-tag-x:hover { background: var(--red-bg); color: var(--red); }
        .p-tag-x svg { width:10px; height:10px; }

        /* ─────────────── ITEMS ─────────────── */
        .items-list { display:flex; flex-direction:column; gap: 10px; }

        .item-row {
            background: var(--bg-2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px;
            transition: border-color .15s;
        }
        .item-row:hover { border-color: var(--border-2); }

        .item-row-top {
            display:flex; align-items:flex-start; gap: 8px;
            margin-bottom: 10px; flex-wrap: wrap;
        }
        .item-name {
            font-weight: 600; color: var(--text);
            font-size: 0.78rem;
            flex: 1; min-width: 0;
            letter-spacing: -0.01em;
            overflow-wrap: break-word;
            white-space: normal;
            line-height: 1.35;
        }
        .item-price {
            color: var(--text); font-weight: 700;
            font-size: 1rem; letter-spacing: -0.02em;
        }
        .btn-del {
            width: 28px; height: 28px;
            display:inline-flex; align-items:center; justify-content:center;
            background: transparent; color: var(--text-muted);
            border: 1px solid var(--border); border-radius: 8px;
            cursor:pointer; transition: all .15s;
            flex-shrink: 0;
        }
        .btn-del:hover { background: var(--red-bg); border-color: rgba(248,113,113,0.35); color: var(--red); }
        .btn-del svg { width: 11px; height: 11px; }

        .item-flags { display:flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
        .item-flags:empty { display:none; }

        .flag-chip {
            display:inline-flex; align-items:center; gap: 6px;
            padding: 6px 10px;
            border-radius: 999px;
            cursor: pointer;
            font-size: 0.74rem; font-weight: 600;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-muted);
            transition: all .15s;
            user-select: none;
        }
        .flag-chip svg { width: 11px; height: 11px; }
        .flag-chip input { display: none; }
        .flag-chip:hover { border-color: var(--border-2); color: var(--text-2); }
        .flag-chip.disc.active {
            background: var(--amber-bg);
            border-color: rgba(233,184,114,0.35);
            color: var(--amber);
        }
        .flag-chip.tip.active {
            background: var(--green-bg);
            border-color: rgba(74,222,128,0.35);
            color: var(--green);
        }

        .item-people { display:flex; flex-wrap:wrap; gap:6px; }
        .person-qty {
            display:flex; flex-direction:column; align-items:center; gap:5px;
            background: var(--surface);
            border:1px solid var(--border);
            border-radius: 10px;
            padding: 8px 10px;
            min-width: 68px;
            transition: border-color .15s;
        }
        .person-qty:focus-within { border-color: var(--primary); background: var(--surface-2); }
        .person-qty label {
            font-size: 0.68rem; font-weight: 600;
            color: var(--text-muted);
            text-align: center;
            letter-spacing: 0.01em;
            max-width: 80px;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .person-qty input {
            width: 48px; padding: 4px 0;
            text-align: center;
            font-size: 1rem;
            font-weight: 700;
            background: var(--bg-2);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 6px;
        }
        .person-qty input:focus { box-shadow: none; }

        .item-empty {
            font-size: 0.8rem; color: var(--text-muted);
            text-align: center; padding: 8px;
            background: var(--surface); border: 1px dashed var(--border);
            border-radius: 8px;
        }

        /* ─────────────── TOTALS BLOCK ─────────────── */
        .totals-block {
            background: var(--bg-2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            margin-top: 14px;
        }
        .total-line {
            display:flex; justify-content:space-between; align-items:flex-start;
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
            font-size: 0.88rem;
            gap: 12px;
        }
        .total-line:last-child { border-bottom: none; }
        .total-line .tl-label { flex: 1; }
        .total-line .tl-head { font-weight: 600; color: var(--text-2); display:flex; align-items:center; gap:6px; }
        .total-line .tl-val { font-weight: 700; letter-spacing: -0.01em; flex-shrink: 0; }

        .total-line.subtotal { background: var(--surface); }
        .total-line.subtotal .tl-head { color: var(--text); }

        .total-line.disc-line { background: rgba(233,184,114,0.04); }
        .total-line.disc-line .tl-head { color: var(--amber); }
        .total-line.disc-line .tl-val  { color: var(--amber); }

        .total-line.tip-line { background: rgba(74,222,128,0.04); }
        .total-line.tip-line .tl-head { color: var(--green); }
        .total-line.tip-line .tl-val  { color: var(--green); }

        .total-line.grand { background: var(--primary-bg-2); padding: 14px; }
        .total-line.grand .tl-head { color:#fff; font-size: 0.95rem; font-weight: 700; }
        .total-line.grand .tl-val  { color:#fff; font-size: 1.05rem; font-weight: 800; }

        .tl-people {
            display:flex; gap: 4px 12px; flex-wrap:wrap;
            margin-top: 6px;
        }
        .tl-person {
            font-size: 0.74rem; color: var(--text-muted);
            font-weight: 500;
        }
        .tl-person b { color: var(--text-2); font-weight: 600; }
        .disc-line .tl-person b { color: var(--amber); }
        .tip-line .tl-person b { color: var(--green); }
        .grand .tl-person { color: rgba(255,255,255,0.65); }
        .grand .tl-person b { color: #fff; }

        /* ─────────────── CFG (discount / tip) ─────────────── */
        .cfg-block {
            margin-top: 16px; padding-top: 16px;
            border-top: 1px solid var(--border);
            display:flex; flex-direction:column; gap: 12px;
        }
        .cfg-group {
            display:flex; align-items:center; gap: 10px; flex-wrap: wrap;
            padding: 10px 12px;
            background: var(--bg-2);
            border: 1px solid var(--border);
            border-radius: 10px;
        }
        .cfg-label {
            font-size: 0.78rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.04em;
            display:flex; align-items:center; gap: 6px;
            min-width: 110px;
        }
        .cfg-label svg { width: 13px; height: 13px; }
        .cfg-group.disc .cfg-label { color: var(--amber); }
        .cfg-group.tip  .cfg-label { color: var(--green); }
        .cfg-input-wrap {
            position: relative; display: inline-flex; align-items: center;
        }
        .cfg-input-wrap input { width: 90px; padding-right: 28px; }
        .cfg-input-wrap::after {
            content: '%'; position:absolute; right: 12px;
            color: var(--text-muted); font-weight: 600; font-size: 0.9rem;
            pointer-events: none;
        }
        .cfg-hint { font-size: 0.72rem; color: var(--text-muted); }

        .toggle-pill {
            padding: 5px 10px; border-radius: 999px;
            border: 1px solid var(--green);
            background: var(--green-bg);
            color: var(--green);
            font-size: 0.7rem; font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor:pointer; transition: all .15s;
            min-height: 28px;
        }
        .toggle-pill.pre {
            background: var(--amber-bg);
            color: var(--amber); border-color: var(--amber);
        }

        /* ─────────────── PERSON CHIPS ─────────────── */
        .person-chips {
            display:grid;
            grid-template-columns: repeat(auto-fill, minmax(125px, 1fr));
            gap: 8px;
        }
        .p-chip {
            background: var(--bg-2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 12px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .p-chip::before {
            content:''; position:absolute; top:0; left:0; right:0; height:2px;
            background: linear-gradient(90deg, var(--primary-2), var(--primary-3));
        }
        .p-chip .pn {
            font-size: 0.78rem; font-weight: 600;
            color: var(--text-2);
            margin-bottom: 6px;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .p-chip .pa {
            font-size: 1.3rem; font-weight: 800;
            color: #fff;
            letter-spacing: -0.03em;
            line-height: 1;
        }
        .p-chip .pl {
            font-size: 0.65rem; color: var(--text-muted);
            margin-top: 4px;
            text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600;
        }

        /* ─────────────── SHARE BUTTONS GRID ─────────────── */
        .share-grid { display:grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .share-grid .btn-full { grid-column: span 2; }

        /* ─────────────── EMPTY STATES ─────────────── */
        .empty {
            text-align: center; padding: 32px 16px;
            color: var(--text-muted);
            font-size: 0.88rem;
            background: var(--bg-2);
            border: 1px dashed var(--border);
            border-radius: var(--radius);
        }
        .empty svg { width: 32px; height: 32px; color: var(--text-dim); margin-bottom: 8px; }

        /* ─────────────── MODAL ─────────────── */
        .modal {
            display:none; position:fixed; inset:0;
            background: rgba(5,6,10,0.75);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 999;
            justify-content: center; align-items: flex-end;
        }
        .modal.open { display:flex; animation: fadeIn .2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(20px); } to { transform: translateY(0); } }
        .modal-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-bottom: none;
            border-radius: 24px 24px 0 0;
            padding: 20px;
            width: 100%; max-width: 620px;
            max-height: 88vh; overflow-y: auto;
            box-shadow: var(--shadow-lg);
            animation: slideUp .25s ease-out;
        }
        .modal-handle {
            width: 40px; height: 4px;
            background: var(--border-2); border-radius: 999px;
            margin: 0 auto 18px;
        }
        .modal-header {
            display:flex; justify-content:space-between; align-items:center;
            margin-bottom: 18px;
        }
        .modal-title {
            display:flex; align-items:center; gap: 10px;
            font-size: 1rem; color: var(--text); font-weight: 700;
            letter-spacing: -0.01em;
        }
        .modal-title svg { width: 18px; height: 18px; color: var(--primary-2); }

        .modal-footer {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 8px; margin-top: 18px;
        }
        .modal-footer .btn-ghost { grid-column: span 2; }

        /* preview boleta */
        #previewWrap { background: #fff; border-radius: 12px; padding: 18px; overflow-x: auto; }
        #previewWrap table {
            width: 100%; border-collapse: collapse;
            font-size: 0.82rem; color: #111;
            min-width: 320px;
            font-family: 'Inter', sans-serif;
        }
        #previewWrap th {
            background: #F4F4F8;
            padding: 10px 12px;
            border: 1px solid #E5E7EB;
            font-weight: 700;
            text-align: right;
            color: #1F2937;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        #previewWrap th:first-child { text-align: left; }
        #previewWrap td {
            padding: 9px 12px;
            border: 1px solid #E5E7EB;
            text-align: right;
            font-variant-numeric: tabular-nums;
        }
        #previewWrap td:first-child { text-align: left; font-weight: 500; }
        #previewWrap tr.p-sub  td { background: #EEF2FF; font-weight: 700; color: #1E1B4B; }
        #previewWrap tr.p-disc td { background: #FEF3C7; color: #78350F; font-weight: 600; }
        #previewWrap tr.p-tip  td { background: #DCFCE7; color: #14532D; font-weight: 600; }
        #previewWrap tr.p-tot  td { background: #4F46E5; color: #fff; font-weight: 800; font-size: 0.95rem; }

        /* ─────────────── TOGGLE ALL/MANUAL ─────────────── */
        .scope-toggle {
            display: inline-flex; border-radius: 999px;
            border: 1px solid var(--border); overflow: hidden;
            background: var(--bg-2);
        }
        .scope-btn {
            padding: 4px 12px; font-size: 0.72rem; font-weight: 600;
            border: none; cursor: pointer; font-family: 'Inter', sans-serif;
            background: transparent; color: var(--text-muted);
            transition: all .15s;
        }
        .scope-btn.active-all  { background: var(--primary); color: #fff; }
        .scope-btn.active-manual { background: var(--surface-3); color: var(--text); }

        /* ─────────────── IMPORT MODAL ─────────────── */
        .prompt-box {
            background: var(--bg-2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px;
            font-size: 0.82rem;
            color: var(--text-2);
            line-height: 1.7;
            font-family: 'JetBrains Mono', monospace;
            margin-bottom: 12px;
            white-space: pre-wrap;
            overflow-wrap: break-word;
            white-space: normal;
        }
        .import-textarea {
            width: 100%;
            min-height: 140px;
            padding: 12px;
            background: var(--bg-2);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 0.88rem;
            font-family: 'JetBrains Mono', monospace;
            resize: vertical;
            line-height: 1.5;
        }
        .import-textarea:focus { outline: none; border-color: var(--primary); }
        .import-textarea::placeholder { color: var(--text-dim); }

        .import-step {
            display: flex; gap: 12px; align-items: flex-start;
            margin-bottom: 14px;
        }
        .step-num {
            width: 24px; height: 24px; border-radius: 999px;
            background: var(--primary-bg); color: var(--primary-2);
            border: 1px solid rgba(99,102,241,0.3);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.72rem; font-weight: 800; flex-shrink: 0;
        }
        .step-text { font-size: 0.85rem; color: var(--text-2); line-height: 1.5; padding-top: 3px; }
        .step-text b { color: var(--text); }

        .import-result {
            background: var(--green-bg);
            border: 1px solid rgba(74,222,128,0.25);
            border-radius: 10px;
            padding: 12px 14px;
            font-size: 0.83rem;
            color: var(--green);
            margin-top: 10px;
            display: none;
        }
        .import-error {
            background: var(--red-bg);
            border: 1px solid rgba(248,113,113,0.25);
            border-radius: 10px;
            padding: 12px 14px;
            font-size: 0.83rem;
            color: var(--red);
            margin-top: 10px;
            display: none;
        }

        /* ─────────────── ASSIGN BADGE ─────────────── */
        .assign-badge {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 3px 9px; border-radius: 999px;
            font-size: 0.72rem; font-weight: 700;
            font-variant-numeric: tabular-nums;
            flex-shrink: 0;
        }
        .assign-badge.ok {
            background: var(--green-bg);
            color: var(--green);
            border: 1px solid rgba(74,222,128,0.25);
        }
        .assign-badge.warn {
            background: var(--amber-bg);
            color: var(--amber);
            border: 1px solid rgba(233,184,114,0.25);
        }
        .assign-badge.over {
            background: var(--red-bg);
            color: var(--red);
            border: 1px solid rgba(248,113,113,0.25);
        }
        .assign-badge svg { width: 10px; height: 10px; }

        #items-status {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 3px 10px; border-radius: 999px;
            font-size: 0.72rem; font-weight: 700;
            transition: all .2s;
        }
        #items-status.neutral { background: var(--surface-2); color: var(--text-muted); border: 1px solid var(--border); }
        #items-status.all-ok  { background: var(--green-bg);  color: var(--green);      border: 1px solid rgba(74,222,128,0.25); }
        #items-status.has-warn{ background: var(--amber-bg);  color: var(--amber);      border: 1px solid rgba(233,184,114,0.25); }
        #items-status svg { width: 11px; height: 11px; }

        /* ─────────────── RESPONSIVE ─────────────── */
        @media (max-width: 380px) {
            body { padding: 16px 12px 60px; }
            .hero-amount { font-size: 2.2rem; }
            .hero-meta { gap: 16px; }
            .card { padding: 14px; }
        }
    </style>
</head>

<script>
let people = [];
let items  = [];
let tipAfterDiscount = true;
let discScope = 'all';   // 'all' | 'manual'
let tipScope  = 'all';   // 'all' | 'manual'

function setDiscScope(scope) {
    discScope = scope;
    document.getElementById('discScopeAll').className    = 'scope-btn' + (scope === 'all'    ? ' active-all' : '');
    document.getElementById('discScopeManual').className = 'scope-btn' + (scope === 'manual' ? ' active-manual' : '');
    if (scope === 'all') {
        items.forEach(i => i.applyDiscount = discPct() > 0);
    }
    renderAll();
}

function setTipScope(scope) {
    tipScope = scope;
    document.getElementById('tipScopeAll').className    = 'scope-btn' + (scope === 'all'    ? ' active-all' : '');
    document.getElementById('tipScopeManual').className = 'scope-btn' + (scope === 'manual' ? ' active-manual' : '');
    if (scope === 'all') {
        items.forEach(i => i.applyTip = tipPct() > 0);
    }
    renderAll();
}

function onDiscPctChange() {
    if (discScope === 'all') items.forEach(i => i.applyDiscount = discPct() > 0);
    renderAll();
}

function onTipPctChange() {
    if (tipScope === 'all') items.forEach(i => i.applyTip = tipPct() > 0);
    renderAll();
}

const discPct = () => parseFloat(document.getElementById('inDiscount').value) || 0;
const tipPct  = () => parseFloat(document.getElementById('inTip').value)      || 0;
const fmt = n  => Math.round(n).toLocaleString('es-CL');

/* ── cálculos ── */
function personItemBase(item, p) { const unitPrice = item.unitPrice || item.price; return unitPrice * (item.qty[p] || 0); }

function personTotal(p) {
    return items.reduce((sum, item) => {
        const base = personItemBase(item, p);
        const disc = item.applyDiscount ? base * discPct() / 100 : 0;
        const postDisc = base - disc;
        const tipBase = (item.applyTip && item.applyDiscount && !tipAfterDiscount) ? base : postDisc;
        const tip = item.applyTip ? tipBase * tipPct() / 100 : 0;
        return sum + postDisc + tip;
    }, 0);
}

function personSubtotal(p)  { return items.reduce((s,i) => s + personItemBase(i,p), 0); }

function personDiscount(p) {
    return items.reduce((s,i) => {
        if (!i.applyDiscount) return s;
        return s + personItemBase(i,p) * discPct() / 100;
    }, 0);
}

function personTip(p) {
    return items.reduce((s,i) => {
        if (!i.applyTip) return s;
        const base = personItemBase(i,p);
        const disc = i.applyDiscount ? base * discPct() / 100 : 0;
        const tipBase = (i.applyDiscount && !tipAfterDiscount) ? base : (base - disc);
        return s + tipBase * tipPct() / 100;
    }, 0);
}

function grandTotal() {
    return items.reduce((s,i) => {
        const base = i.price;
        const disc = i.applyDiscount ? base * discPct() / 100 : 0;
        const postDisc = base - disc;
        const tipBase = (i.applyTip && i.applyDiscount && !tipAfterDiscount) ? base : postDisc;
        const tip = i.applyTip ? tipBase * tipPct() / 100 : 0;
        return s + postDisc + tip;
    }, 0);
}

/* ── agregar / quitar ── */
function addPerson() {
    const inp = document.getElementById('inPerson');
    const name = inp.value.trim();
    if (!name) { inp.focus(); return; }
    if (people.includes(name)) { alert('Esa persona ya existe'); return; }
    people.push(name);
    items.forEach(i => { i.qty[name] = 0; if (!i.units) { i.units = 1; i.unitPrice = i.price; } });
    inp.value = '';
    renderAll();
}

function removePerson(name) {
    people = people.filter(p => p !== name);
    items.forEach(i => delete i.qty[name]);
    renderAll();
}

function addItem() {
    const iInp = document.getElementById('inItem');
    const pInp = document.getElementById('inPrice');
    const qInp = document.getElementById('inQty');
    const name  = iInp.value.trim();
    const price = parseFloat(pInp.value);
    const qty   = parseInt(qInp.value) || 1;
    if (!name || isNaN(price) || price <= 0) { alert('Completa nombre y precio'); return; }

    // buscar si ya existe un item con el mismo nombre (case-insensitive)
    const existing = items.find(i => i.name.toLowerCase() === name.toLowerCase());
    if (existing) {
        // mismo nombre: acumular unidades (asumimos mismo precio unitario)
        existing.units     += qty;
        existing.unitPrice  = price; // usar el último precio ingresado como referencia
        existing.price      = Math.round(existing.unitPrice * existing.units);
    } else {
        const pQty = {};
        people.forEach(p => pQty[p] = 0);
        items.push({ id: Date.now(), name, price: price * qty, unitPrice: price, units: qty, qty: pQty, applyDiscount: discScope === 'all' && discPct() > 0, applyTip: tipScope === 'all' && tipPct() > 0 });
    }

    iInp.value = ''; pInp.value = ''; qInp.value = '1';
    iInp.focus();
    renderAll();
}

function removeItem(id) {
    items = items.filter(i => i.id !== id);
    renderAll();
}

function setQty(id, person, val) {
    const item = items.find(i => i.id === id);
    if (item) item.qty[person] = parseFloat(val) || 0;
    renderBadges();
    renderTotals();
    renderStats();
    renderPeopleChips();
}

function renderBadges() {
    let allOk = true;
    let anyProblem = false;

    items.forEach(item => {
        const el = document.getElementById('badge-' + item.id);
        const assigned = people.reduce((s,p) => s + (item.qty[p] || 0), 0);
        const total    = item.units || 1;
        const ok       = assigned === total;
        const over     = assigned > total;

        if (!ok) allOk = false;
        if (!ok || over) anyProblem = true;

        if (!el || people.length === 0) return;
        if (ok) {
            el.className = 'assign-badge ok';
            el.innerHTML = '<svg><use href="#i-check"/></svg>' + assigned + '/' + total;
        } else if (over) {
            el.className = 'assign-badge over';
            el.innerHTML = '<svg><use href="#i-alert"/></svg>' + assigned + '/' + total + ' · de más';
        } else {
            el.className = 'assign-badge warn';
            el.innerHTML = '<svg><use href="#i-alert"/></svg>' + assigned + '/' + total + ' · faltan ' + (total - assigned);
        }
    });

    // actualizar estado del card header
    const statusEl = document.getElementById('items-status');
    if (!statusEl) return;
    if (people.length === 0 || items.length === 0) {
        statusEl.className = 'card-count neutral';
        statusEl.innerHTML = items.length;
    } else if (allOk) {
        statusEl.className = 'card-count all-ok';
        statusEl.innerHTML = '<svg><use href="#i-check"/></svg> Todo asignado';
    } else {
        const pending = items.filter(item => {
            const assigned = people.reduce((s,p) => s + (item.qty[p] || 0), 0);
            return assigned !== (item.units || 1);
        }).length;
        statusEl.className = 'card-count has-warn';
        statusEl.innerHTML = '<svg><use href="#i-alert"/></svg> ' + pending + ' sin completar';
    }
}

function toggleDiscount(id, val) {
    const item = items.find(i => i.id === id);
    if (item) { item.applyDiscount = val; renderAll(); }
}

function toggleTip(id, val) {
    const item = items.find(i => i.id === id);
    if (item) { item.applyTip = val; renderAll(); }
}

function toggleTipBase() {
    tipAfterDiscount = !tipAfterDiscount;
    const btn = document.getElementById('tipToggleBtn');
    document.getElementById('tipToggleLabel').textContent = tipAfterDiscount
        ? 'sobre precio c/ descuento'
        : 'sobre precio s/ descuento';
    btn.classList.toggle('pre', !tipAfterDiscount);
    renderAll();
}

/* ── escape util ── */
function esc(s) {
    return String(s).replace(/[&<>"']/g, c => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    })[c]);
}

/* ── render ── */
function renderAll() {
    renderPeopleTags();
    renderItems();
    renderTotals();
    renderStats();
    renderPeopleChips();
}

function renderPeopleTags() {
    const wrap = document.getElementById('peopleTags');
    wrap.innerHTML = people.map(p => `
        <div class="p-tag">${esc(p)}
            <button class="p-tag-x" onclick="removePerson('${esc(p).replace(/'/g,"\\'")}')" aria-label="Quitar ${esc(p)}">
                <svg><use href="#i-x"/></svg>
            </button>
        </div>`).join('');
    document.getElementById('cnt-people').textContent = people.length;
}

function renderItems() {
    const d = discPct(), t = tipPct();
    const hasDisc = d > 0, hasTip = t > 0;

    const toggleBtn = document.getElementById('tipToggleBtn');
    toggleBtn.style.display = (hasDisc && hasTip) ? 'inline-flex' : 'none';

    const card = document.getElementById('itemsCard');
    if (items.length === 0) { card.style.display = 'none'; return; }
    card.style.display = 'block';
    document.getElementById('cnt-items') && (document.getElementById('cnt-items').textContent = items.length);
    setTimeout(renderBadges, 0); // after DOM update

    document.getElementById('itemsList').innerHTML = items.map(item => {
        const peopleQty = people.map(p => `
            <div class="person-qty">
                <label>${esc(p)}</label>
                <input type="number" min="0" step="1"
                    value="${item.qty[p] > 0 ? item.qty[p] : ''}"
                    placeholder="0"
                    oninput="setQty(${item.id},'${esc(p).replace(/'/g,"\\'")}',this.value)">
            </div>
        `).join('');

        const showDiscChip = hasDisc && discScope === 'manual';
        const showTipChip  = hasTip  && tipScope  === 'manual';
        const flags = (showDiscChip || showTipChip) ? `
            <div class="item-flags">
                ${showDiscChip ? `<label class="flag-chip disc ${item.applyDiscount?'active':''}">
                    <input type="checkbox" ${item.applyDiscount?'checked':''} onchange="toggleDiscount(${item.id},this.checked)">
                    <svg><use href="#i-tag"/></svg> Descuento
                </label>` : ''}
                ${showTipChip ? `<label class="flag-chip tip ${item.applyTip?'active':''}">
                    <input type="checkbox" ${item.applyTip?'checked':''} onchange="toggleTip(${item.id},this.checked)">
                    <svg><use href="#i-handshake"/></svg> Propina
                </label>` : ''}
            </div>` : '';

        const noPeople = people.length === 0
            ? '<div class="item-empty">Agrega personas para asignar cantidades ↑</div>'
            : `<div class="item-people">${peopleQty}</div>`;

        const unitInfo = (item.units > 1)
            ? `<span style="font-size:0.68rem;color:var(--text-muted);margin-left:4px;white-space:nowrap">${item.units}× $${fmt(item.unitPrice)}c/u</span>`
            : '';

        // badge de asignación
        const assigned = people.reduce((s,p) => s + (item.qty[p] || 0), 0);
        const total    = item.units || 1;
        let badge = '';
        if (people.length > 0) {
            if (assigned === total) {
                badge = `<span id="badge-${item.id}" class="assign-badge ok"><svg><use href="#i-check"/></svg>${assigned}/${total}</span>`;
            } else if (assigned > total) {
                badge = `<span id="badge-${item.id}" class="assign-badge over"><svg><use href="#i-alert"/></svg>${assigned}/${total} · de más</span>`;
            } else {
                const missing = total - assigned;
                badge = `<span id="badge-${item.id}" class="assign-badge warn"><svg><use href="#i-alert"/></svg>${assigned}/${total} · faltan ${missing}</span>`;
            }
        }

        return `<div class="item-row">
            <div class="item-row-top">
                <span class="item-name">${esc(item.name)}</span>
                <span class="item-price mono" style="display:flex;align-items:center;gap:4px;flex-wrap:wrap;justify-content:flex-end">
                    $${fmt(item.price)}${unitInfo}
                    ${badge}
                </span>
                <button class="btn-del" onclick="removeItem(${item.id})" aria-label="Eliminar">
                    <svg><use href="#i-trash"/></svg>
                </button>
            </div>
            ${flags}
            ${noPeople}
        </div>`;
    }).join('');
}

function renderTotals() {
    if (items.length === 0) return;
    const d = discPct(), t = tipPct();
    const discItems = items.filter(i => i.applyDiscount);
    const tipItems  = items.filter(i => i.applyTip);

    const grandSub  = items.reduce((s,i) => s+i.price, 0);
    const grandDisc = discItems.reduce((s,i) => s + i.price*d/100, 0);
    const grandTip  = tipItems.reduce((s,i) => {
        const b=i.price, d2=i.applyDiscount?b*d/100:0;
        const tb=(i.applyDiscount&&!tipAfterDiscount)?b:(b-d2);
        return s+tb*t/100;
    }, 0);
    const gTotal = grandSub - grandDisc + grandTip;

    const subPeople = people.length ? `<div class="tl-people">${people.map(p=>
        `<span class="tl-person">${esc(p)} <b class="mono">$${fmt(personSubtotal(p))}</b></span>`
    ).join('')}</div>` : '';

    const discPeople = people.length && discItems.length ? `<div class="tl-people">${people.map(p=>{
        const pd=personDiscount(p); return pd>0?`<span class="tl-person">${esc(p)} <b class="mono">-$${fmt(pd)}</b></span>`:''
    }).join('')}</div>` : '';

    const tipPeople = people.length && tipItems.length ? `<div class="tl-people">${people.map(p=>{
        const pt=personTip(p); return pt>0?`<span class="tl-person">${esc(p)} <b class="mono">+$${fmt(pt)}</b></span>`:''
    }).join('')}</div>` : '';

    const totalPeople = people.length ? `<div class="tl-people">${people.map(p=>
        `<span class="tl-person">${esc(p)} <b class="mono">$${fmt(personTotal(p))}</b></span>`
    ).join('')}</div>` : '';

    let html = `<div class="totals-block">
        <div class="total-line subtotal">
            <div class="tl-label"><div class="tl-head">Subtotal</div>${subPeople}</div>
            <div class="tl-val mono">$${fmt(grandSub)}</div>
        </div>`;

    if (d > 0 && discItems.length > 0) {
        html += `<div class="total-line disc-line">
            <div class="tl-label"><div class="tl-head"><svg style="width:12px;height:12px"><use href="#i-tag"/></svg> Descuento ${d}%</div>${discPeople}</div>
            <div class="tl-val mono">-$${fmt(grandDisc)}</div>
        </div>`;
    }

    if (t > 0 && tipItems.length > 0) {
        html += `<div class="total-line tip-line">
            <div class="tl-label"><div class="tl-head"><svg style="width:12px;height:12px"><use href="#i-handshake"/></svg> Propina ${t}%</div>${tipPeople}</div>
            <div class="tl-val mono">+$${fmt(grandTip)}</div>
        </div>`;
    }

    html += `<div class="total-line grand">
        <div class="tl-label"><div class="tl-head">Total a pagar</div>${totalPeople}</div>
        <div class="tl-val mono">$${fmt(gTotal)}</div>
    </div></div>`;

    document.getElementById('totalsBlock').innerHTML = html;
}

function downloadImage() {
    const d = discPct(), t = tipPct();
    const discItems = items.filter(i => i.applyDiscount);
    const tipItems  = items.filter(i => i.applyTip);

    const scale  = 2;
    const padX   = 32;
    const padY   = 28;
    const rowH   = 36;
    const headH  = 44;
    const fontSize = 12;
    const headerFontSize = 10;

    // calcular ancho dinámico según personas
    const nameColW = 180;
    const priceColW = 90;
    const personColW = 90;
    const W = padX * 2 + nameColW + priceColW + people.length * personColW;

    const extraRows = 1
        + (d > 0 && discItems.length > 0 ? 1 : 0)
        + (t > 0 && tipItems.length > 0  ? 1 : 0)
        + 1;
    const H = padY + 48 + headH + (items.length + extraRows) * rowH + padY;

    const canvas  = document.createElement('canvas');
    canvas.width  = W * scale;
    canvas.height = H * scale;
    const ctx = canvas.getContext('2d');
    ctx.scale(scale, scale);

    // fondo blanco
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, W, H);

    // helpers
    function txt(str, x, y, { size=fontSize, weight='500', color='#111827', align='left', maxW=9999 } = {}) {
        ctx.font = `${weight} ${size}px Inter, system-ui, sans-serif`;
        ctx.fillStyle = color;
        ctx.textAlign = align;
        ctx.textBaseline = 'middle';
        let s = String(str ?? '');
        while (s.length > 1 && ctx.measureText(s).width > maxW) s = s.slice(0, -1);
        if (s !== String(str ?? '')) s = s.slice(0, -1) + '…';
        ctx.fillText(s, x, y);
    }

    function hline(y, color='#E5E7EB') {
        ctx.strokeStyle = color; ctx.lineWidth = 0.5;
        ctx.beginPath(); ctx.moveTo(padX, y); ctx.lineTo(W - padX, y); ctx.stroke();
    }

    function fillRect(x, y, w, h, color, radius=0) {
        ctx.fillStyle = color;
        if (radius > 0) {
            ctx.beginPath(); ctx.roundRect(x, y, w, h, radius); ctx.fill();
        } else {
            ctx.fillRect(x, y, w, h);
        }
    }

    // col X positions
    const col = {
        name:  padX,
        price: padX + nameColW,
        people: i => padX + nameColW + priceColW + i * personColW,
    };

    // ── título ──
    let y = padY;
    ctx.font = '800 20px Inter, system-ui, sans-serif';
    ctx.fillStyle = '#111';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText('Di', col.name, y + 14);
    const diW = ctx.measureText('Di').width;
    ctx.fillStyle = '#4F46E5';
    ctx.fillText('Bill', col.name + diW, y + 14);
    y += 40;

    // ── header ──
    fillRect(padX, y, W - padX * 2, headH, '#F4F4F8', 8);
    const muted = '#6B7280', dark = '#1F2937';

    txt('ITEM',   col.name  + 10,              y + headH/2, { size: headerFontSize, weight:'700', color: muted });
    txt('PRECIO', col.price + priceColW/2,     y + headH/2, { size: headerFontSize, weight:'700', color: muted, align:'center' });
    people.forEach((p, i) => {
        txt(p, col.people(i) + personColW/2, y + headH/2, {
            size: headerFontSize, weight:'700', color:'#4F46E5',
            align:'center', maxW: personColW - 8
        });
    });
    y += headH;

    // ── items ──
    items.forEach((item, idx) => {
        fillRect(padX, y, W - padX * 2, rowH, idx % 2 === 0 ? '#fff' : '#F9FAFB');
        hline(y + rowH);

        const label = item.name + (item.units > 1 ? ` ×${item.units}` : '')
            + (item.applyDiscount ? ' ·d' : '') + (item.applyTip ? ' ·p' : '');
        txt(label,                    col.name  + 10,           y + rowH/2, { weight:'600', color: dark, maxW: nameColW - 16 });
        txt('$'+fmt(item.price),      col.price + priceColW/2,  y + rowH/2, { weight:'700', color:'#4F46E5', align:'center', maxW: priceColW - 8 });

        people.forEach((p, i) => {
            const v = item.qty[p] || 0;
            if (v > 0) txt(v, col.people(i) + personColW/2, y + rowH/2, { weight:'700', color: dark, align:'center' });
        });
        y += rowH;
    });

    // ── fila helper ──
    function totalRow(label, grandVal, personFn, bg, color, bold=false) {
        fillRect(padX, y, W - padX * 2, rowH, bg);
        hline(y + rowH, '#E5E7EB');
        const w = bold ? '700' : '600';
        txt(label,     col.name  + 10,           y + rowH/2, { size: fontSize, weight: w, color, maxW: nameColW - 16 });
        txt(grandVal,  col.price + priceColW/2,  y + rowH/2, { size: fontSize, weight: w, color, align:'center', maxW: priceColW - 8 });
        people.forEach((p, i) => {
            const v = personFn(p);
            if (v) txt(v, col.people(i) + personColW/2, y + rowH/2, { size: fontSize, weight: w, color, align:'center', maxW: personColW - 8 });
        });
        y += rowH;
    }

    const grandSub = items.reduce((s,i) => s + i.price, 0);
    totalRow('Subtotal', '$'+fmt(grandSub), p => '$'+fmt(personSubtotal(p)), '#EEF2FF', '#1E1B4B', true);

    if (d > 0 && discItems.length > 0) {
        const gd = discItems.reduce((s,i) => s + i.price*d/100, 0);
        totalRow(`Descuento ${d}%`, '-$'+fmt(gd), p => { const v=personDiscount(p); return v>0?'-$'+fmt(v):''; }, '#FEF3C7', '#92400E');
    }

    if (t > 0 && tipItems.length > 0) {
        const gt = tipItems.reduce((s,i)=>{const b=i.price,d2=i.applyDiscount?b*d/100:0,tb=(i.applyDiscount&&!tipAfterDiscount)?b:(b-d2);return s+tb*t/100;},0);
        totalRow(`Propina ${t}%`, '+$'+fmt(gt), p => { const v=personTip(p); return v>0?'+$'+fmt(v):''; }, '#DCFCE7', '#14532D');
    }

    // ── total final ──
    fillRect(padX, y, W - padX * 2, rowH + 4, '#4F46E5', 8);
    txt('TOTAL',           col.name  + 10,          y + (rowH+4)/2, { size:13, weight:'800', color:'#fff' });
    txt('$'+fmt(grandTotal()), col.price + priceColW/2, y + (rowH+4)/2, { size:13, weight:'800', color:'#fff', align:'center', maxW: priceColW - 8 });
    people.forEach((p, i) => {
        txt('$'+fmt(personTotal(p)), col.people(i) + personColW/2, y + (rowH+4)/2, { size:13, weight:'800', color:'#fff', align:'center', maxW: personColW - 8 });
    });

    // ── copiar al portapapeles ──
    canvas.toBlob(blob => {
        try {
            const item = new ClipboardItem({ 'image/png': blob });
            navigator.clipboard.write([item]).then(() => {
                const btn = document.querySelector('[onclick="downloadImage()"]');
                const orig = btn.innerHTML;
                btn.innerHTML = '<svg><use href="#i-check"/></svg> ¡Copiada!';
                setTimeout(() => btn.innerHTML = orig, 2000);
            }).catch(() => fallbackDownload(canvas));
        } catch(e) {
            fallbackDownload(canvas);
        }
    }, 'image/png');
}

function fallbackDownload(canvas) {
    const a = document.createElement('a');
    a.href = canvas.toDataURL('image/png');
    a.download = 'dibill-cuenta.png';
    a.click();
}

function openImportModal() {

const IMPORT_PROMPT = `Analiza la boleta en la imagen. Devuélveme SOLO un array JSON sin texto adicional, sin explicaciones, sin markdown.

Reglas estrictas:
- Usa el precio UNITARIO original de cada producto (sin descuentos aplicados)
- Ignora completamente las líneas de: descuento, propina, subtotal, total, servicio
- Si un producto aparece varias veces, agrúpalo sumando las cantidades
- Los precios deben ser números enteros sin puntos, comas ni símbolos
- Si no puedes leer un precio con certeza, omite ese item

Formato exacto:
[{"nombre":"Nombre del producto","precio":9990,"cantidad":1}]`;

function copyPrompt() {
    const prompt = IMPORT_PROMPT;
    navigator.clipboard.writeText(prompt).then(() => {
        const lbl = document.getElementById('copyPromptLabel');
        lbl.textContent = '¡Copiado!';
        setTimeout(() => lbl.textContent = 'Copiar prompt', 2000);
    }).catch(() => {
        // fallback
        const ta = document.createElement('textarea');
        ta.value = prompt;
        document.body.appendChild(ta);
        ta.select(); document.execCommand('copy');
        document.body.removeChild(ta);
        const lbl = document.getElementById('copyPromptLabel');
        lbl.textContent = '¡Copiado!';
        setTimeout(() => lbl.textContent = 'Copiar prompt', 2000);
    });
}

function doImport() {
    const raw = document.getElementById('importTextarea').value.trim();
    const resultEl = document.getElementById('importResult');
    const errorEl  = document.getElementById('importError');
    resultEl.style.display = 'none';
    errorEl.style.display  = 'none';

    if (!raw) { errorEl.textContent = 'Pega la respuesta del chat primero.'; errorEl.style.display = 'block'; return; }

    // limpiar caracteres especiales que pegan apps de chat
    const cleaned = raw
        .replace(/[“”„‟″‶]/g, '"') // comillas tipográficas → "
        .replace(/[‘’‚‛′‵]/g, "'") // comillas simples tipográficas → '
        .replace(/[–—]/g, '-')  // guiones largos → -
        .trim();

    // intentar parsear directo, o extraer JSON si viene con texto alrededor
    let parsed;
    try {
        // primero intentar el texto completo
        parsed = JSON.parse(cleaned);
    } catch(e) {
        // buscar un array JSON dentro del texto
        const start = cleaned.indexOf('[');
        const end   = cleaned.lastIndexOf(']');
        if (start === -1 || end === -1 || end <= start) {
            errorEl.textContent = 'No encontré un JSON válido. Asegúrate de copiar la respuesta completa del chat.';
            errorEl.style.display = 'block'; return;
        }
        try { parsed = JSON.parse(cleaned.slice(start, end + 1)); }
        catch(e2) { errorEl.textContent = 'El JSON tiene errores de formato. Intenta pedirle de nuevo al chat.'; errorEl.style.display = 'block'; return; }
    }

    if (!Array.isArray(parsed) || parsed.length === 0) {
        errorEl.textContent = 'La respuesta no contiene items válidos.';
        errorEl.style.display = 'block'; return;
    }

    let imported = 0;
    let skipped  = 0;

    parsed.forEach(item => {
        // normalizar campos (acepta variantes en español e inglés)
        const nombre   = item.nombre || item.name || item.producto || item.item || '';
        const precioRaw = item.precio || item.price || item.precio_unitario || 0;
        const cantRaw   = item.cantidad || item.quantity || item.qty || 1;

        // limpiar precio: sacar puntos, comas, símbolos
        const precio = parseInt(String(precioRaw).replace(/[^0-9]/g, '')) || 0;
        const cant   = parseInt(cantRaw) || 1;

        if (!nombre || precio <= 0) { skipped++; return; }

        // buscar si ya existe
        const existing = items.find(i => i.name.toLowerCase() === nombre.toLowerCase());
        if (existing) {
            existing.units    += cant;
            existing.unitPrice = precio;
            existing.price     = existing.unitPrice * existing.units;
        } else {
            const qty = {};
            people.forEach(p => qty[p] = 0);
            items.push({ id: Date.now() + Math.random(), name: nombre, price: precio * cant, unitPrice: precio, units: cant, qty, applyDiscount: discScope === 'all' && discPct() > 0, applyTip: tipScope === 'all' && tipPct() > 0 });
        }
        imported++;
    });

    if (imported === 0) {
        errorEl.textContent = 'No se pudo importar ningún item. Revisa el formato.';
        errorEl.style.display = 'block'; return;
    }

    const msg = skipped > 0
        ? `✓ ${imported} items importados. ${skipped} omitidos por datos incompletos.`
        : `✓ ${imported} items importados correctamente.`;

    resultEl.textContent   = msg;
    resultEl.style.display = 'block';

    renderAll();
    setTimeout(closeImportModal, 1200);
}

/* ── PWA Install ── */
let deferredPrompt = null;
const installBtn   = document.getElementById('installBtn');

window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    installBtn.style.display = 'flex';
});

installBtn.addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    if (outcome === 'accepted') installBtn.style.display = 'none';
    deferredPrompt = null;
});

window.addEventListener('appinstalled', () => {
    installBtn.style.display = 'none';
});

/* ── Service Worker (cache offline) ── */
if ('serviceWorker' in navigator) {
    const swCode = `
        const CACHE = 'dibill-v1';
        self.addEventListener('install', e => {
            e.waitUntil(caches.open(CACHE).then(c => c.addAll(['/'])));
            self.skipWaiting();
        });
        self.addEventListener('activate', e => {
            e.waitUntil(caches.keys().then(keys =>
                Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
            ));
            self.clients.claim();
        });
        self.addEventListener('fetch', e => {
            e.respondWith(caches.match(e.request).then(r => r || fetch(e.request)));
        });
    `;
    const swBlob = new Blob([swCode], { type: 'application/javascript' });
    const swURL  = URL.createObjectURL(swBlob);
    navigator.serviceWorker.register(swURL, { scope: '/' }).catch(() => {});
}
